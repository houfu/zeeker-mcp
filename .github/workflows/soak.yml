# .github/workflows/soak.yml
# Purpose: TEST-05 + NFR-01..03 — full 24h soak under 50-concurrent synthetic load
#          against the LIVE production endpoint at mcp.zeeker.sg.
#
# Trigger: workflow_dispatch ONLY (no cron — 25h CI burn per run + production load).
#
# Requirements:
#   - Repository secret SOAK_BYPASS_TOKEN must be set; the same value must be
#     present in the production container's environment for the run window.
#     Production sets the env via docker-compose (env_file) and restarts the
#     container before the soak; unsets it again after.
#
# Effect on production while the soak runs:
#   - Driver sends X-Soak-Bypass: $SOAK_BYPASS_TOKEN with every request →
#     server rate limiter is bypassed for these requests only. Other users
#     are unaffected (their per-IP buckets are untouched).
#   - Driver polls https://mcp.zeeker.sg/admin/metrics every 60s for RSS;
#     same token-gating, returns 404 to anyone without the header.
#   - The soak is a real 50-concurrent load test against production. Confirm
#     with ops before pressing the button — this is NOT a CI dry-run.

name: 24h Soak (manual)

on:
  workflow_dispatch:

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 1500  # 25h budget per 08-RESEARCH.md line 1111

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          version: "0.11.14"  # CLAUDE.md pinned version

      - run: uv sync --frozen

      - name: Preflight — production server reachable + token valid
        env:
          SOAK_BYPASS_TOKEN: ${{ secrets.SOAK_BYPASS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SOAK_BYPASS_TOKEN:-}" ]; then
            echo "ERROR: SOAK_BYPASS_TOKEN secret is not set on this workflow run."
            echo "Add it under repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          # /healthz is unauthenticated; if this fails, the server is unreachable.
          curl -fsS https://mcp.zeeker.sg/healthz > /dev/null \
            || { echo "ERROR: mcp.zeeker.sg/healthz unreachable — aborting soak"; exit 1; }
          # /admin/metrics returns 404 without the token and 200 with it.
          # Confirm the token is correctly propagated to the production server.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-Soak-Bypass: ${SOAK_BYPASS_TOKEN}" \
            https://mcp.zeeker.sg/admin/metrics)
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: /admin/metrics returned HTTP $STATUS — token mismatch?"
            echo "Confirm SOAK_BYPASS_TOKEN is identical in this repo's secrets"
            echo "and in the production container's environment."
            exit 1
          fi
          echo "Preflight OK — /healthz reachable, /admin/metrics authenticated."

      - name: Run 24h soak against mcp.zeeker.sg
        env:
          SOAK_BYPASS_TOKEN: ${{ secrets.SOAK_BYPASS_TOKEN }}
        run: |
          uv run python -m scripts.soak.run_soak \
            --duration 86400 \
            --concurrency 50 \
            --target-url https://mcp.zeeker.sg \
            --rss-sample-interval 60 \
            --out-dir ./soak-results

      - name: Report + gate
        run: |
          uv run python -m scripts.soak.report \
            --results-dir ./soak-results \
            --max-p50-ms 300 \
            --max-p95-ms 1500 \
            --max-rss-mb 256

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        if: always()
        with:
          name: soak-results
          path: ./soak-results/
